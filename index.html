<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Investment Research · Equity Analysis Reports</title>
<meta name="description" content="Equity analysis reports covering US, China A-share, Hong Kong, and private markets with quantitative audit and DCF valuation.">
<link rel="stylesheet" href="./assets/css/main.css">
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <a href="./" class="nav-logo">Stock Analysis Reports</a>
  <div class="nav-links">
  </div>
</nav>

<!-- Hero -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-text">
      <p>Quantitative audit · DCF valuation · Multi-perspective thesis — US, China A-shares, HK, Private Markets</p>
    </div>
  </div>
</div>

<!-- Stats -->
<div class="stats-strip">
  <div class="stats-row" id="stats-row"></div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Search by ticker, company name, or sector..." autocomplete="off">
  </div>
  <div class="tab-group" role="tablist">
    <button class="tab-btn active" data-market="all">All</button>
    <button class="tab-btn" data-market="us">🇺🇸 US</button>
    <button class="tab-btn" data-market="a">🇨🇳 A-Shares</button>
    <button class="tab-btn" data-market="hk">🇭🇰 HK</button>
    <button class="tab-btn" data-market="pe">Private</button>
  </div>
  <select class="sort-select" id="sort-select">
    <option value="date-desc">Latest First</option>
    <option value="date-asc">Oldest First</option>
    <option value="score-desc">Score High → Low</option>
    <option value="score-asc">Score Low → High</option>
  </select>
  <select class="sort-select" id="min-score">
    <option value="0">All Scores</option>
    <option value="4">≥ 4.0</option>
    <option value="6">≥ 6.0</option>
    <option value="7.5">≥ 7.5</option>
  </select>
</div>

<div class="results-info" id="results-info">Loading...</div>

<!-- Reports -->
<div class="reports">
  <div id="reports-container"></div>
</div>

<!-- Footer -->
<div class="footer">
  <div class="footer-inner">
    <span>Disclaimer: These reports are for informational purposes only and do not constitute investment advice.</span>
  </div>
</div>

<script src="./assets/js/render.js"></script>
</body>
</html>
